<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Метод Найшвидшого Спуску (Steepest Descent)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        h1 { margin-bottom: 5px; color: #fbbf24; }
        p { color: #94a3b8; margin-bottom: 20px; }

        .container {
            position: relative;
            width: 600px;
            height: 400px;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            border: 2px solid #fbbf24;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .contour {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(251, 191, 36, 0.2);
            border-radius: 50%;
        }

        #ball {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #fbbf24;
            border-radius: 50%;
            box-shadow: 0 0 15px #fbbf24, inset 0 0 5px white;
            z-index: 10;
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translate(-50%, -50%);
        }

        #line-path {
            position: absolute;
            height: 1px;
            background: rgba(251, 191, 36, 0.4);
            transform-origin: left center;
            display: none;
            z-index: 5;
            border-top: 1px dashed #fbbf24;
        }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background-color: #fbbf24;
            color: #0f172a;
        }
        button:hover { background-color: #fcd34d; transform: translateY(-2px); }
        button:disabled { background-color: #475569; cursor: not-allowed; transform: none; }
        
        #reset-btn { background-color: #475569; color: white; }

        .status-panel {
            margin-top: 20px;
            padding: 15px;
            background: #1e293b;
            border-radius: 8px;
            min-width: 450px;
            text-align: center;
            border-bottom: 4px solid #fbbf24;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
            font-family: monospace;
            font-size: 14px;
        }
        .loss-val { color: #ef4444; font-weight: bold; }
        .alpha-val { color: #38bdf8; font-weight: bold; }

        .target {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            background: #fbbf24;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px #fbbf24;
        }
    </style>
</head>
<body>

    <h1>Метод Найшвидшого Спуску</h1>
    <p>Використання лінійного пошуку (Line Search) для оптимального кроку</p>

    <div class="container" id="canvas">
        <div class="target"></div>
        <div id="ball"></div>
        <div id="line-path"></div>
    </div>

    <div class="status-panel">
        <div id="status-text">Метод SD: Натисніть "Крок", щоб знайти оптимальну альфа</div>
        <div class="stats">
            <div>Ітерація: <span id="step-count">0</span></div>
            <div>Втрати: <span id="loss-value" class="loss-val">0.920</span></div>
            <div>Оптим. &alpha;: <span id="alpha-value" class="alpha-val">---</span></div>
        </div>
    </div>

    <div class="controls">
        <button id="step-btn">Зробити оптимальний крок</button>
        <button id="reset-btn">Скинути</button>
    </div>

    <script>
        const ball = document.getElementById('ball');
        const linePath = document.getElementById('line-path');
        const canvas = document.getElementById('canvas');
        const statusText = document.getElementById('status-text');
        const stepDisplay = document.getElementById('step-count');
        const lossDisplay = document.getElementById('loss-value');
        const alphaDisplay = document.getElementById('alpha-value');
        
        let posX = 120;
        let posY = 50;
        let steps = 0;
        const targetX = 300;
        const targetY = 200;

        // Малюємо еліптичні контури (типово для SD)
        for(let i = 1; i <= 10; i++) {
            const contour = document.createElement('div');
            contour.className = 'contour';
            contour.style.width = (i * 120) + 'px';
            contour.style.height = (i * 60) + 'px';
            canvas.appendChild(contour);
        }

        function updateUI() {
            ball.style.left = posX + 'px';
            ball.style.top = posY + 'px';
            const dist = Math.sqrt(Math.pow(posX - targetX, 2) + Math.pow(posY - targetY, 2));
            lossDisplay.innerText = (dist / 300).toFixed(4);
            
            if (dist < 8) {
                statusText.innerText = "✨ Оптімум досягнуто швидше завдяки точному вибору кроку!";
                document.getElementById('step-btn').disabled = true;
            }
        }

        function performSDStep() {
            const dx = targetX - posX;
            const dy = targetY - posY;

            // В методі SD ми шукаємо мінімум вздовж лінії градієнта
            // Для візуалізації ми робимо "великий" крок до точки, де градієнт стане ортогональним
            // (характерний зигзаг)
            
            statusText.innerText = "🔍 Виконуємо Line Search (Золотий перетин)...";
            
            // Візуалізація лінії пошуку
            linePath.style.display = 'block';
            linePath.style.left = posX + 'px';
            linePath.style.top = posY + 'px';
            linePath.style.width = '500px';
            const angle = Math.atan2(dy, dx) * 180 / Math.PI;
            linePath.style.transform = `rotate(${angle}deg)`;

            setTimeout(() => {
                // В методі SD крок набагато більший, ніж у GD
                const alpha = (0.4 + Math.random() * 0.3).toFixed(3);
                alphaDisplay.innerText = alpha;
                
                posX += dx * parseFloat(alpha);
                posY += dy * parseFloat(alpha);
                
                steps++;
                stepDisplay.innerText = steps;
                updateUI();
                linePath.style.display = 'none';
                statusText.innerText = `✅ Знайдено мінімум на лінії. Крок α = ${alpha}`;
            }, 600);
        }

        document.getElementById('step-btn').addEventListener('click', performSDStep);
        document.getElementById('reset-btn').addEventListener('click', () => {
            posX = 120; posY = 50; steps = 0;
            stepDisplay.innerText = "0";
            alphaDisplay.innerText = "---";
            document.getElementById('step-btn').disabled = false;
            updateUI();
        });

        updateUI();
    </script>
</body>
</html>
